name: multi-cli-compat
version: 2.5.0
cli_compat: [claude-code, opencode, gemini-cli, codex, cursor, copilot, lsp]
depends_on: []
description: >
  Hacer que un plugin funcione en varios CLIs (Claude Code, Gemini, OpenCode, Codex,
  Cursor, Copilot): tres estrategias (MCP wrapper / skills agnósticas / skills con
  tool-mapping), manifiestos por CLI, archivos de instrucciones (AGENTS.md/GEMINI.md),
  y traducción de nombres de tools entre plataformas.
provides:
  - .claude-plugin/plugin.json
  - .codex-plugin/plugin.json
  - .cursor-plugin/plugin.json
  - .copilot-plugin/plugin.json
  - gemini-extension.json + GEMINI.md
  - .mcp.json + opencode.json + .lsp.json
  - AGENTS.md / CLAUDE.md
  - references/tool-mapping.md
  - install-skills.sh
  - cli-config.yaml
  - bin/dev/generate-cli-configs.py
