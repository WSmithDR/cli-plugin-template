name: growth-engine
version: 1.1.0
cli_compat: [claude-code, opencode, gemini-cli, any]
depends_on: []
description: >
  Motor de auto-mejora del plugin. Captura feedback/fricción mid-session sin
  interrumpir el flujo (manual, proactiva o por auto-harvest de eventos), lo
  loguea, y un motor de hotpatch lo procesa después: articula el gap, mapea el
  archivo correcto, aplica el parche y commitea.
provides:
  - skills/<plugin>-feedback-log/SKILL.md (patrón; incluye captura proactiva + auto-harvest)
  - skills/<plugin>-hotpatch/SKILL.md (patrón)
  - metadata _hotpatch en archivos de control
  - signal capability-gap (el plugin no tiene código para lo pedido)
