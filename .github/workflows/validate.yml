name: Validate catalog

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate catalog integrity
        run: python3 bin/validate-catalog.py
      - name: Validate skill evals schema
        run: python3 bin/validate-evals.py
      - name: Validate shell scripts parse
        run: |
          fail=0
          while IFS= read -r f; do
            bash -n "$f" || { echo "✗ $f"; fail=1; }
          done < <(find features bin \( -name '*.sh' -o -name 'pre-commit' -o -name 'post-commit' \))
          exit $fail
      - name: Validate JSON files parse
        run: |
          fail=0
          while IFS= read -r f; do
            python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f" \
              || { echo "✗ $f"; fail=1; }
          done < <(find features .claude-plugin .codex-plugin .cursor-plugin .copilot-plugin \
                     -name '*.json' 2>/dev/null; \
                   ls gemini-extension.json opencode.json 2>/dev/null)
          exit $fail
      - name: Run meta-plugin hook tests
        run: bash bin/test-hooks.sh
      - name: Run catalog-gap audit tests
        run: bash bin/test-catalog-gaps.sh
      - name: Run skill-evals validator tests
        run: bash bin/test-evals.sh
      - name: Run version-bump tests
        run: bash bin/test-bump-version.sh
      - name: Portability audit (block on CRITICAL)
        run: python3 features/portability-audit/files/audit-portability.py . --quiet
